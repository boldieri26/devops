- name: upgrade de todos os pacotes do s.o
  yum:
    name: "*"
    state: latest
- name: instalacao do git client
  yum:
    name: git
    state: latest
- name: Configurar o host Ansible
  lineinfile: 
    dest: /etc/hosts 
    state: present
    line: "{{item}}"
    with_items:
      - 192.169.1.2 control-node
      - 192.169.1.3 app01
      - 192.169.1.4 db01